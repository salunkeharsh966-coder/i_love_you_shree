<!DOCTYPE html>
<html>
<head>
<title>Please Forgive Me 🥺❤️</title>

<style>
body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    font-family: Arial, sans-serif;
    text-align: center;
    color: white;
    background: linear-gradient(-45deg, #ff4d6d, #ff758c, #ff7eb3, #ffb199);
    background-size: 400% 400%;
    animation: gradientBG 8s ease infinite;
}

@keyframes gradientBG {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
}

.container {
    margin-top: 80px;
    animation: fadeIn 2s ease;
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(30px);}
    to {opacity: 1; transform: translateY(0);}
}

h1 {
    font-size: 42px;
}

p {
    font-size: 20px;
    width: 70%;
    margin: 20px auto;
}

button {
    padding: 15px 35px;
    font-size: 18px;
    border: none;
    border-radius: 30px;
    cursor: pointer;
    margin: 20px;
    transition: 0.3s;
}

#yesBtn {
    background: white;
    color: #ff4d6d;
    font-weight: bold;
}

#yesBtn:hover {
    transform: scale(1.15);
}

#noBtn {
    background: #ff1e4d;
    color: white;
    position: absolute;
}

.heart {
    position: absolute;
    font-size: 22px;
    animation: fall linear forwards;
}

@keyframes fall {
    to {
        transform: translateY(100vh);
        opacity: 0;
    }
}

</style>
</head>

<body>

<div class="container">
<h1>I Really Messed Up 😔</h1>

<p>
Kal meri wajah se tum royi...  
Aur mujhe us baat ka sabse zyada regret hai.  
Main kabhi bhi tumhe hurt nahi karna chahta.  
Please mujhe ek chance aur de do 🥺❤️
</p>

<button id="yesBtn" onclick="forgive()">Forgive Me 🥺</button>
<button id="noBtn" onmouseover="moveBtn()">No 😡</button>
</div>

<script>
const noBtn = document.getElementById("noBtn");

function moveBtn() {
    const x = Math.random() * (window.innerWidth - 100);
    const y = Math.random() * (window.innerHeight - 100);
    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
}

function forgive() {
    for(let i=0;i<40;i++){
        createHeart();
    }
    setTimeout(()=>{
        alert("Yayyy 🥺❤️ Thank you for forgiving me. I promise I'll never make you cry again.");
    },500);
}

function createHeart() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.animationDuration = (Math.random() * 3 + 2) + "s";
    document.body.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 5000);
}

setInterval(createHeart, 300);
</script>

</body>
</html>
